name: UI Pipeline

on:
  push:
    braches: [ "main" ]
    
jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build container
        working-directory: ./ui
        run: sudo docker build --no-cache -t pomoticker:latest .

      - name: Stop existing container
        run: docker stop pomoticker_ui_container || true

      - name: Run
        run: docker run -d --name pomoticker_ui_container pomoticker:latest
